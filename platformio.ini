; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_esp32c6]
platform = espressif32
board = seeed_xiao_esp32c6
framework = espidf
; Set the monitor speed to match ESP-IDF's default output speed
monitor_speed = 115200

; Enable WebSocket support in HTTP server + increase header buffer
build_flags =
    -DCONFIG_HTTPD_WS_SUPPORT
    -DCONFIG_HTTPD_MAX_REQ_HDR_LEN=1024

; You can also add your port here to make things easier
monitor_port = COM3
upload_port = COM3

; Run python script to embed HTML as C header before build
extra_scripts = pre:generate_html_header.py
